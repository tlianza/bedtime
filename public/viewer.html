<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Bedtime Story</title>
		<link rel="stylesheet" href="/style.css" />
		<!-- Error + connection telemetry (Sentry, CDN loader — no build step).
		     Session Replay is force-disabled: it would record the kids/book. -->
		<script src="https://js.sentry-cdn.com/cd29fbdcbc0115f19aecc8f35a1117ca.min.js" crossorigin="anonymous"></script>
		<script>
			window.Sentry &&
				Sentry.onLoad(function () {
					Sentry.init({
						replaysSessionSampleRate: 0,
						replaysOnErrorSampleRate: 0,
						tracesSampleRate: 0,
						environment: location.hostname.endsWith('workers.dev') ? 'production' : 'dev',
						beforeSend: function (e) {
							return location.hostname.endsWith('workers.dev') ? e : null
						},
					})
				})
		</script>
	</head>
	<body>
		<!-- The book fills the screen. It's either a live screen-share <video>
		     (laptop reader) or a synced page <img> (iPad / book-file reader) —
		     whichever the reader is using. The reader's face sits in the corner. -->
		<div class="stage">
			<video id="book" autoplay playsinline></video>
			<img id="bookpage" alt="story page" hidden />
			<video id="readerface" class="pip" autoplay playsinline muted></video>
			<audio id="readeraudio" autoplay></audio>
		</div>

		<!-- Shown only if the browser blocks audio autoplay (common on iOS). One
		     tap is a fresh user gesture that unblocks sound. -->
		<button id="soundbtn" class="sound-btn" hidden>🔊 Tap for sound</button>

		<!-- Shown while the media connection is dropping/rebuilding. -->
		<div id="netbanner" class="netbanner" hidden></div>

		<!-- iPad/Safari needs a tap before camera + audio playback are allowed. -->
		<div class="overlay-start" id="overlay">
			<div class="card">
				<h1>📖 Story time!</h1>
				<p class="sub">Tap to join. You'll share your camera so the reader can see you.</p>
				<button id="start">Tap to join</button>
			</div>
		</div>

		<script type="module" src="/viewer.js"></script>
	</body>
</html>
