<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Bedtime — Reading</title>
		<link rel="stylesheet" href="/style.css" />
		<!-- Error + connection telemetry (Sentry, CDN loader — no build step).
		     Session Replay is force-disabled: it would record the kids/book. -->
		<script src="https://js.sentry-cdn.com/cd29fbdcbc0115f19aecc8f35a1117ca.min.js" crossorigin="anonymous"></script>
		<script>
			window.Sentry &&
				Sentry.onLoad(function () {
					Sentry.init({
						replaysSessionSampleRate: 0,
						replaysOnErrorSampleRate: 0,
						tracesSampleRate: 0,
						environment: location.hostname.endsWith('workers.dev') ? 'production' : 'dev',
						beforeSend: function (e) {
							return location.hostname.endsWith('workers.dev') ? e : null
						},
					})
				})
		</script>
	</head>
	<body>
		<!-- Before we start, a simple prompt (also satisfies the browser gesture
		     requirement before requesting camera + screen). -->
		<div class="overlay-start" id="overlay">
			<div class="card">
				<h1>Ready to read?</h1>
				<p class="sub">
					You'll be asked to share your <strong>camera</strong>, then to pick the
					<strong>book window/tab</strong> to share.
				</p>
				<button id="start">Start reading</button>
				<p class="hint">Tip: open your book in Kindle Cloud Reader first, then share that tab.</p>
			</div>
		</div>

		<!-- Shown while the media connection is dropping/rebuilding. -->
		<div id="netbanner" class="netbanner" hidden></div>

		<div class="reader-grid">
			<!-- The kids' faces (so you can see reactions), plus a small preview
			     of the book you're sharing so you can read along. -->
			<div id="kids">
				<figure class="share-tile" id="share-tile" hidden>
					<video id="screenpreview" autoplay playsinline muted></video>
					<figcaption>What you're sharing</figcaption>
				</figure>
			</div>

			<!-- Toolbar: your self-view + the link to send the kids -->
			<div class="reader-bar">
				<video id="selfcam" autoplay playsinline muted></video>
				<div class="grow">
					<input id="viewerlink" type="text" readonly placeholder="kid link will appear here" />
					<div class="hint" id="status">Not connected yet.</div>
				</div>
				<button id="copy" class="secondary">Copy link</button>
			</div>
		</div>

		<script type="module" src="/reader.js"></script>
	</body>
</html>
