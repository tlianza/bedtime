<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>Bedtime Stories</title>
		<link rel="stylesheet" href="/style.css" />
	</head>
	<body>
		<div class="center">
			<div class="card">
				<h1>📖 Bedtime Stories</h1>
				<p class="sub">Read to your kids from anywhere.</p>

				<label for="room">Room name</label>
				<input id="room" type="text" value="storytime" autocomplete="off" />

				<button id="book">📚 Read from a book file (works on iPad)</button>
				<button id="screen" class="secondary">🖥️ Read by sharing my screen (Mac/laptop)</button>
				<button id="join" class="secondary">👶 Join as a kid</button>
				<p class="hint" id="screen-hint"></p>
				<p class="hint">
					Parents: start a room, then copy the kid link from the toolbar and send it.
				</p>
			</div>
		</div>

		<script>
			const roomInput = document.getElementById('room')
			const slug = () => encodeURIComponent(roomInput.value.trim() || 'storytime')
			document.getElementById('book').onclick = () => (location.href = `/book?room=${slug()}`)
			document.getElementById('screen').onclick = () => (location.href = `/reader?room=${slug()}`)
			document.getElementById('join').onclick = () => (location.href = `/viewer?room=${slug()}`)

			// Screen-share isn't available on iPad/iOS browsers — flag it.
			if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
				const btn = document.getElementById('screen')
				btn.disabled = true
				document.getElementById('screen-hint').textContent =
					'Screen sharing isn’t supported on this device — use the book-file option above.'
			}
		</script>
	</body>
</html>
